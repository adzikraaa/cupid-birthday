<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<!-- LINK CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="cursor"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-title">🎂 HAPPY BIRTHDAY! 🎂</div>
  <div class="intro-subtitle">
    Lari sejauh 500m untuk<br>
    melihat kejutan spesial!
  </div>
  <button class="start-btn" onclick="startGame()">▶ MULAI</button>
</div>

<!-- GAME -->
<div id="game-container">

  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>

  <div id="hud">
    <div id="score-display">0 M</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="game-area">
    <div id="ground"></div>

    <div id="dino">
      <!-- SVG tetep -->
      <svg viewBox="0 0 60 70">
        <rect x="20" y="20" width="30" height="28" rx="4" fill="#4caf50"/>
        <rect x="32" y="8" width="22" height="18" rx="3" fill="#4caf50"/>
        <rect x="48" y="11" width="5" height="5" fill="white"/>
        <rect x="50" y="13" width="3" height="3" fill="#1a1a2e"/>
        <rect class="leg-left" x="25" y="46" width="8" height="16" fill="#388e3c"/>
        <rect class="leg-right" x="37" y="46" width="8" height="16" fill="#388e3c"/>
      </svg>
    </div>

    <div id="obstacles"></div>
  </div>

  <div id="gameover">
    <h2>GAME OVER!</h2>
    <div id="dead-score"></div>
    <button onclick="restartGame()">▶ COBA LAGI</button>
  </div>

</div>

<div id="black-overlay"></div>

<!-- ENDING -->
<div id="ending">
  <div id="ending-content">
    <img id="ending-photo" class="ending-photo">
    <div id="ending-name"></div>
    <div id="ending-message"></div>
    <div class="dev-signature"></div>
  </div>
</div>

<audio id="bgm" loop>
  <source src="assets/bg-music.mp3" type="audio/mpeg">
</audio>

<!-- LINK JS -->
<script src="script.js"></script>
</body>
</html>
